<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>주간 보드</title>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, "Apple SD Gothic Neo", "Pretendard", sans-serif; background:#fafaf8; color:#1f1e1c; padding:calc(12px + env(safe-area-inset-top)) calc(12px + env(safe-area-inset-right)) calc(14px + env(safe-area-inset-bottom)) calc(12px + env(safe-area-inset-left)); }
  .top { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; flex-wrap:wrap; gap:8px; }
  .top h1 { font-size:17px; font-weight:700; }
  .top .sub { font-size:12px; color:#8a8782; margin-top:2px; }
  .nav { display:flex; gap:6px; }
  .nav button { border:1px solid #dcd9d3; background:#fff; border-radius:8px; padding:4px 12px; font-size:13px; cursor:pointer; color:#1f1e1c; }
  .nav button:hover { background:#f0efec; }
  .legend { display:flex; gap:14px; font-size:12px; color:#5f5c56; margin-bottom:10px; flex-wrap:wrap; }
  .legend .k { display:inline-block; width:12px; height:12px; border-radius:3px; margin-right:5px; vertical-align:-2px; }
  #err { color:#a33; font-size:13px; margin:8px 0; display:none; }
  .loading { color:#8a8782; font-size:13px; padding:30px; text-align:center; }

  .gridwrap { overflow-x:auto; -webkit-overflow-scrolling:touch; padding-bottom:6px; }
  .grid { display:grid; grid-template-columns:44px repeat(7, minmax(110px,1fr)); gap:0 6px; min-width:860px; }
  .dhead { text-align:center; font-size:12.5px; font-weight:700; padding:4px 0 6px; }
  .dhead .dt { font-weight:400; color:#8a8782; font-size:11px; margin-left:3px; }
  .dhead.today { color:#c96f4a; }
  .gutter { position:sticky; left:0; z-index:4; background:#fafaf8; }
  .gutter .hr { position:absolute; right:6px; font-size:10px; color:#a7a49e; transform:translateY(-50%); }
  .col { position:relative; background:#fff; border:1px solid #ebe9e4; border-radius:8px; }
  .col.today { border:1.5px solid #c96f4a; }
  .col.past { background:#fbfaf8; }
  .hline { position:absolute; left:0; right:0; border-top:1px solid #f3f1ed; }
  .blk { position:absolute; left:3px; right:3px; border-radius:5px; font-size:10.5px; line-height:1.25; padding:2px 5px; overflow:hidden; }
  .blk .t { color:inherit; opacity:.65; font-size:9.5px; display:block; }
  .blk.fixed { background:#fff; border:1px solid #dedbd4; color:#6b6862; }
  .blk.flex-work { border-style:dashed; }
  .blk.evt { background:#f5dfae; border:1px solid #ecd08a; color:#6b5518; }
  .blk.evt.done { opacity:.55; }
  .blk.evt.ov { left:50%; }
  .blk.flex { background:#d7e8f6; border:1px dashed #8eb8dd; color:#285d86; font-weight:650; z-index:2; }
  .blk.open { background:#cfe6d4; border:1px solid #b5d9be; color:#2a6b3f; font-weight:600; }
  .blk.open.tired { background:#e7f1e2; border-color:#d4e5cd; color:#6b8a5e; font-weight:400; }
  .nowline { position:absolute; left:0; right:0; border-top:2px solid #c96f4a; z-index:5; }
  .tips { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin:8px 0 12px; }
  .tip { background:#fff; border:1px solid #e6e4df; border-left:3px solid #7cb98c; border-radius:8px; padding:9px 10px; font-size:12px; line-height:1.35; color:#3d3a35; }
  @media (max-width:800px){ .tips { grid-template-columns:1fr; } }

  .pool { margin-top:16px; display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  @media (max-width:800px){ .pool { grid-template-columns:1fr; } }
  .pcard { background:#fff; border:1px solid #e6e4df; border-radius:12px; padding:12px; }
  .pcard h2 { font-size:13px; margin-bottom:3px; }
  .pcard .note { font-size:11px; color:#a7a49e; margin-bottom:8px; }
  .chips { display:flex; flex-wrap:wrap; gap:6px; }
  .chip { font-size:11.5px; padding:4px 9px; border-radius:8px; background:#f6f5f2; border:1px solid #e6e4df; display:inline-flex; gap:5px; align-items:center; }
  .chip .day { color:#c96f4a; font-weight:700; }
  .chip .imp { width:7px; height:7px; border-radius:50%; }
  .imp-h { background:#dd7d6a; } .imp-m { background:#e2c04d; } .imp-l { background:#c9c6c0; }
  .chip .ddl { color:#a33; font-size:10.5px; }
  .chip.done { opacity:.5; text-decoration:line-through; }

  .cards { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:14px; }
  @media (max-width:700px){ .cards { grid-template-columns:1fr; } }
  .card { background:#fff; border:1px solid #e6e4df; border-radius:12px; padding:14px 16px; }
  .card .l { font-size:12px; color:#5f5c56; }
  .card .v { font-size:26px; font-weight:800; margin:2px 0; }
  .card .d { font-size:11px; color:#a7a49e; }
  .foot { margin-top:12px; font-size:11px; color:#a7a49e; line-height:1.5; }
  @media (max-width:600px){
    body { padding:calc(10px + env(safe-area-inset-top)) calc(8px + env(safe-area-inset-right)) calc(12px + env(safe-area-inset-bottom)) calc(8px + env(safe-area-inset-left)); }
    .top { align-items:flex-start; margin-bottom:8px; }
    .top h1 { font-size:16px; line-height:1.2; }
    .top .sub { font-size:11px; max-width:34ch; }
    .nav { width:100%; display:grid; grid-template-columns:1fr 1fr 1fr; gap:5px; }
    .nav button { padding:7px 4px; font-size:12px; min-width:0; }
    .legend { gap:8px 10px; font-size:11px; margin-bottom:8px; }
    .tips { margin:6px 0 10px; gap:6px; }
    .tip { padding:8px 9px; font-size:11.5px; }
    .gridwrap { margin:0 -8px; padding:0 8px 8px; }
    .grid { grid-template-columns:36px repeat(7, minmax(82px, 1fr)); gap:0 4px; min-width:640px; }
    .dhead { font-size:11px; padding:3px 0 5px; }
    .dhead .dt { display:block; margin-left:0; font-size:10px; }
    .gutter .hr { right:4px; font-size:9px; }
    .col { border-radius:7px; }
    .blk { left:2px; right:2px; border-radius:5px; font-size:9.5px; padding:2px 4px; }
    .blk .t { font-size:8.5px; }
    .pool { margin-top:12px; gap:8px; }
    .pcard { border-radius:8px; padding:10px; }
    .cards { gap:8px; margin-top:10px; }
    .card { border-radius:8px; padding:11px 12px; }
    .card .v { font-size:22px; }
    .foot { font-size:10.5px; }
  }
  @media (orientation:landscape) and (max-height:520px){
    body { padding:8px calc(10px + env(safe-area-inset-right)) 8px calc(10px + env(safe-area-inset-left)); }
    .top { margin-bottom:6px; }
    .top h1 { font-size:15px; }
    .top .sub { font-size:10.5px; }
    .nav button { padding:4px 9px; font-size:12px; }
    .legend { margin-bottom:6px; font-size:10.5px; }
    .tips { grid-template-columns:repeat(3,minmax(0,1fr)); gap:6px; margin:6px 0 8px; }
    .tip { font-size:10.5px; padding:7px 8px; }
    .grid { grid-template-columns:38px repeat(7, minmax(92px,1fr)); min-width:760px; gap:0 5px; }
    .pool { grid-template-columns:1fr 1fr; margin-top:10px; }
    .cards { grid-template-columns:repeat(3,1fr); }
  }
</style>

<body>
<div class="top">
  <div>
    <h1 id="title">주간 보드 <span id="ver" style="font-size:10px;color:#c9c6c0;font-weight:400">v2.0</span></h1>
    <div class="sub">프라임 슬롯 기반 자동 재배치 · 참고자료 기반 인사이트 · 데이터: 현재 보드 스냅샷</div>
  </div>
  <div class="nav">
    <button onclick="move(-1)">◀ 지난주</button>
    <button onclick="move(0)">이번주</button>

  </div>
</div>
<div class="legend">
  <span><span class="k" style="background:#cfe6d4"></span>오픈 프라임</span>
  <span><span class="k" style="background:#d7e8f6;border:1px dashed #8eb8dd"></span>유동 배치</span>
  <span><span class="k" style="background:#f5dfae"></span>일정·약속</span>
</div>
<div id="err"></div>
<div id="tips" class="tips"></div>
<div class="gridwrap"><div id="grid" class="grid"><div class="loading" style="grid-column:1/-1">불러오는 중…</div></div></div>
<div id="dbg" style="font-size:10px;color:#c9c6c0;margin-top:6px;font-family:monospace"></div>
<div class="pool">
  <div class="pcard">
    <h2>🎯 이번주 유동 할일 <span id="flexn" style="color:#a7a49e;font-weight:400"></span></h2>
    <div class="note">요일에 계획은 했지만 상황 따라 움직이는 것들 (배치일 = 날짜만)</div>
    <div class="chips" id="flexpool"></div>
  </div>
  <div class="pcard">
    <h2>📥 백로그 (미배치) <span id="backn" style="color:#a7a49e;font-weight:400"></span></h2>
    <div class="note">쌓여있는 대기 태스크 — 배치일 없음, 중요도·마감 순</div>
    <div class="chips" id="backpool"></div>
  </div>
</div>
<div class="cards" id="cards"></div>
<div class="foot" id="foot">
  고정 템플릿은 가용 시간 계산에만 사용하고 화면에는 숨김 · 19시 이전 시작 & 2.5h+ = 프라임 ·
  유동 할일은 프라임 슬롯에 소프트 배치, 일정 기본 길이 1h (종료시각 입력 시 그대로)
</div>
<script>
const BACKLOG = 'collection://6afab719-1652-40de-b208-57553457cd1d';
const DLOG = 'collection://6fb75a12-2819-4704-963d-f25382da1bdd';
const QTOOL = 'mcp__6d69519f-567a-4ae0-9acd-cd1c2de39ba5__notion-query-data-sources';
const BAKED = {"ts":"template","backlog":[],"dlog":[]};

const DAY_S = 6*60, DAY_E = 24*60;
let PXH = responsivePxHour();
let H = (DAY_E-DAY_S)/60*PXH;
// 고정 주간 템플릿 (v1: 하드코딩 — 추후 Notion 이관 가능)
const TEMPLATE = {
  all: [{s:'07:10', e:'07:50', l:'런'}],
  work:[{s:'08:20', e:'08:50', l:'이동'}, {s:'09:00', e:'18:00', l:'근무'}],   // 월~목
  wfh: [{s:'09:00', e:'18:00', l:'재택(유연)', flex:true}]                      // 금
};
const PRIME_MINUTES = 150;
const MIN_FLEX_MINUTES = 30;
const DEFAULT_FLEX_MINUTES = 60;
const MAX_FLEX_MINUTES = 150;
const PLACEABLE_TYPES = new Set(['할일','행동변화','루틴']);
let offset = 0;
let backlog=null, dlog=null;

function responsivePxHour(){
  if(window.matchMedia('(orientation: landscape) and (max-height: 520px)').matches) return 24;
  if(window.matchMedia('(max-width: 600px)').matches) return 28;
  return 34;
}
function refreshDensity(){
  PXH = responsivePxHour();
  H = (DAY_E-DAY_S)/60*PXH;
}
const min = t => { const [h,m]=t.split(':').map(Number); return h*60+m; };
const fmt = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
function monday(base){ const d=new Date(base); const wd=(d.getDay()+6)%7; d.setDate(d.getDate()-wd); d.setHours(0,0,0,0); return d; }
const hm = m => `${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`;
// Notion SQL datetime은 UTC("YYYY-MM-DD HH:MM:SSZ") → 로컬(KST) 변환 필수
function bdInfo(s){
  if(!s) return null;
  if(s.length<=10) return {date:s, m:null, label:''};
  const dt = new Date(s.replace(' ','T'));
  if(isNaN(dt)) return {date:s.slice(0,10), m:null, label:''};
  return {date:fmt(dt), m:dt.getHours()*60+dt.getMinutes(),
          label:`${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}`};
}
function initialOffset(){
  const saved = localStorage.getItem('wb_offset');
  if(saved!==null) return parseInt(saved||'0');
  const now = new Date(); const today = new Date(now); today.setHours(0,0,0,0);
  const currentMon = monday(today);
  const currentEnd = new Date(currentMon.getTime()+6*86400000);
  const dates = (BAKED.backlog||[]).map(r=>bdInfo(r.bd)).filter(Boolean).map(x=>x.date).sort();
  if(dates.some(d=>d>=fmt(currentMon) && d<=fmt(currentEnd))) return 0;
  const future = dates.find(d=>d>=fmt(today));
  if(!future) return 0;
  const targetMon = monday(new Date(`${future}T00:00:00`));
  return Math.round((targetMon.getTime()-currentMon.getTime())/(7*86400000));
}
offset = initialOffset();
function isActiveStatus(status){
  const s = String(status||'대기').toLowerCase();
  if(['완료','취소','cancelled','canceled','done','completed'].includes(s)) return false;
  return true;
}
function importanceRank(v){ return ({'상':0, high:0, '중':1, medium:1, '하':2, low:2})[v] ?? 2; }
function deadlineKey(r){ return r.ddl ? String(r.ddl).slice(0,10) : '9999-12-31'; }
function isPlaceableFlex(r){ return PLACEABLE_TYPES.has(r['유형']) && isActiveStatus(r['상태']); }
function parseEstimateMinutes(v){
  if(!v) return DEFAULT_FLEX_MINUTES;
  const text = String(v).toLowerCase();
  if(text.includes('분산')) return 90;
  let m = text.match(/(\d+(?:\.\d+)?)\s*[~\-]\s*(\d+(?:\.\d+)?)\s*h/);
  if(m) return ((Number(m[1])+Number(m[2]))/2)*60;
  m = text.match(/(\d+(?:\.\d+)?)\s*(?:h|시간)/);
  if(m) return Number(m[1])*60;
  m = text.match(/(\d+)\s*(?:m|분)/);
  if(m) return Number(m[1]);
  return DEFAULT_FLEX_MINUTES;
}
function flexDuration(r){
  const rounded = Math.ceil(parseEstimateMinutes(r['예상소요'])/15)*15;
  return Math.min(MAX_FLEX_MINUTES, Math.max(MIN_FLEX_MINUTES, rounded));
}
function isPrimeBlock(b){ return b.s<=19*60 && (b.e-b.s)>=PRIME_MINUTES; }
const t0=Date.now();
function dbg(m){ const el=document.getElementById('dbg');
  el.textContent += `[${((Date.now()-t0)/1000).toFixed(1)}s] ${m}  `; }
dbg('v2.0-web 스크립트 시작');
function showErr(msg){
  const el=document.getElementById('err');
  el.style.display='block'; el.textContent=msg;
  document.getElementById('grid').innerHTML='';
}
function stage(msg){
  const g=document.getElementById('grid');
  if(g.querySelector('.loading')) g.querySelector('.loading').textContent=msg;
}
window.onerror=(m,src,l)=>{ showErr(`스크립트 오류: ${m} (line ${l})`); };
const timeout=(p,ms,tag)=> Promise.race([p, new Promise((_,rej)=>setTimeout(()=>rej(new Error(tag+' 응답 없음 ('+(ms/1000)+'s 초과) — 사이드바 상단 Reload를 눌러봐')), ms))]);
async function waitCowork(){
  for(let i=0;i<8;i++){
    if(window.cowork && window.cowork.callMcpTool) return true;
    if(i===10) stage('Cowork API 대기 중…');
    await new Promise(r=>setTimeout(r,200));
  }
  return false;
}
async function q(urls, query, tag){
  const r = await timeout(window.cowork.callMcpTool(QTOOL, {data:{data_source_urls:urls, query}}), 30000, tag);
  if(r.isError) throw new Error(tag+': '+(r.content?.[0]?.text || 'query failed').slice(0,300));
  const p = r.structuredContent ?? JSON.parse(r.content[0].text);
  return p.results || [];
}
async function load(){
  try{
    if(!await waitCowork()){
      dbg('cowork 없음 → 정적 스냅샷 모드');
      backlog = BAKED.backlog; dlog = BAKED.dlog;
      const v=document.getElementById('ver'); if(v) v.textContent = 'v2.0 · 스냅샷 ' + BAKED.ts;
      render(); dbg('렌더 완료(스냅샷)'); return;
    }
    dbg('cowork API 확인');
    stage('백로그 쿼리 중…');
    backlog = await q([BACKLOG], `SELECT "할일","Dimension","유형","상태","중요도","예상소요","date:배치일:start" AS bd,"date:배치일:end" AS be,"date:마감:start" AS ddl,"마감유형" AS dt FROM "${BACKLOG}"`, '백로그');
    dbg(`백로그 ${backlog.length}행`);
    stage('데일리 로그 쿼리 중…');
    dlog = await q([DLOG], `SELECT "날짜","부하","컨디션" FROM "${DLOG}"`, '데일리로그');
    dbg(`로그 ${dlog.length}행`);
    render();
    dbg('렌더 완료');
  }catch(e){
    showErr('데이터 로드 실패: '+e.message);
  }
}
function move(k){ offset=(k===0)?0:offset+k; localStorage.setItem('wb_offset',offset); render(); }
const top = m => (m-DAY_S)/60*PXH;

function fixedBusy(wd){
  const busy=[];
  TEMPLATE.all.forEach(b=> busy.push({s:min(b.s), e:min(b.e), l:b.l, cls:'fixed', visible:false}));
  if(wd<=3) TEMPLATE.work.forEach(b=> busy.push({s:min(b.s), e:min(b.e), l:b.l, cls:'fixed', visible:false}));
  if(wd===4) TEMPLATE.wfh.forEach(b=> busy.push({s:min(b.s), e:min(b.e), l:b.l, cls:'fixed flex-work', visible:false}));
  return busy;
}
function timedBusyForDay(rows, key, wd){
  const busy = fixedBusy(wd);
  rows.forEach(r=>{
    const bi=bdInfo(r.bd);
    if(!bi || bi.date!==key || bi.m===null) return;
    const beI=bdInfo(r.be);
    const e = (beI && beI.date===key && beI.m!==null) ? beI.m : bi.m+60;
    busy.push({s:bi.m, e, l:r['할일'], cls:'evt'+(r['상태']==='완료'?' done':''), tm:bi.label, evt:true, visible:true});
  });
  return busy.sort((a,b)=>a.s-b.s);
}
function openBlocks(busy){
  const merged=[]; busy.forEach(b=>{ const last=merged[merged.length-1];
    if(last && b.s<=last.e) last.e=Math.max(last.e,b.e); else merged.push({s:b.s,e:b.e}); });
  const open=[]; let cur=7*60;
  merged.forEach(b=>{ if(b.s>cur) open.push({s:cur,e:Math.min(b.s,23.5*60)}); cur=Math.max(cur,b.e); });
  if(cur<23.5*60) open.push({s:cur,e:23.5*60});
  return open;
}
function flexCandidates(rows, mon, weekEnd){
  const start = fmt(mon);
  return rows.map((r,index)=>({r,index,info:bdInfo(r.bd)}))
    .filter(x=> isPlaceableFlex(x.r) && x.info && x.info.m===null && x.info.date>=start && x.info.date<=weekEnd)
    .sort((a,b)=>{
      const todayA = a.r['상태']==='오늘' ? 0 : 1, todayB = b.r['상태']==='오늘' ? 0 : 1;
      if(todayA!==todayB) return todayA-todayB;
      const hardA = a.r.dt==='hard' ? 0 : 1, hardB = b.r.dt==='hard' ? 0 : 1;
      if(hardA!==hardB) return hardA-hardB;
      const ddl = deadlineKey(a.r).localeCompare(deadlineKey(b.r));
      if(ddl) return ddl;
      const imp = importanceRank(a.r['중요도']) - importanceRank(b.r['중요도']);
      return imp || a.index-b.index;
    });
}
function buildFlexPlan(rows, days, dows, mon, weekEnd, now){
  const candidates = flexCandidates(rows, mon, weekEnd);
  const slots=[];
  days.forEach((d,i)=>{
    const key=fmt(d);
    const busy = timedBusyForDay(rows, key, i);
    openBlocks(busy).forEach(b=>{
      if(!isPrimeBlock(b)) return;
      const start = key===fmt(now) ? Math.max(b.s, now.getHours()*60+now.getMinutes()) : b.s;
      if(key<fmt(now) || b.e-start<MIN_FLEX_MINUTES) return;
      slots.push({date:key, dow:dows[i], s:start, e:b.e, cursor:start});
    });
  });
  const byDate={}, placed=[], unplaced=[];
  candidates.forEach(c=>{
    const duration = flexDuration(c.r);
    const due = c.r.ddl ? String(c.r.ddl).slice(0,10) : null;
    const latest = due && due<weekEnd ? due : weekEnd;
    const currentDate = c.info?.date;
    const canUseSlot = (s, needed)=> s.date<=latest && s.e-s.cursor>=needed && (!currentDate || s.date>=currentDate || c.r.dt==='hard');
    const slot = slots.find(s=>canUseSlot(s,duration)) || slots.find(s=>canUseSlot(s,MIN_FLEX_MINUTES));
    if(!slot){ unplaced.push(c.r); return; }
    const minutes = Math.min(duration, slot.e-slot.cursor);
    const block = {row:c.r, date:slot.date, dow:slot.dow, s:slot.cursor, e:slot.cursor+minutes, duration:minutes, partial:minutes<duration};
    slot.cursor = block.e;
    (byDate[block.date] ||= []).push(block);
    placed.push(block);
  });
  return {byDate, placed, unplaced, candidates:candidates.map(c=>c.r)};
}

function render(){
  refreshDensity();
  const now = new Date(); const today=new Date(now); today.setHours(0,0,0,0);
  const mon = monday(new Date(today.getTime()+offset*7*86400000));
  const days = [...Array(7)].map((_,i)=> new Date(mon.getTime()+i*86400000));
  const dows = ['월','화','수','목','금','토','일'];
  const weekEnd = fmt(days[6]);
  document.getElementById('title').textContent =
    `주간 보드 · ${mon.getMonth()+1}/${mon.getDate()} – ${days[6].getMonth()+1}/${days[6].getDate()}`;

  // 실제 에너지 (데일리 로그 → 요일 헤더 닷: 🔴폭발 🟡보통 🟢가벼움 ⚪미기록)
  const logByDate={};
  dlog.forEach(r=>{ const t=String(r['날짜']||'');
    let m=t.match(/(\d{4})[-./](\d{1,2})[-./](\d{1,2})/);
    let dk=m?`${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`:null;
    if(!dk){ m=t.match(/(\d{1,2})[\/.](\d{1,2})/); if(m) dk=`${now.getFullYear()}-${m[1].padStart(2,'0')}-${m[2].padStart(2,'0')}`; }
    if(dk) logByDate[dk]=r; });
  const eColor={'가벼움':'#7cb98c','보통':'#e2c04d','폭발':'#dd7d6a'};

  // 헤더 행 + 시간 눈금
  let html = '<div></div>' + days.map((d,i)=>{
    const t = d.getTime()===today.getTime();
    let dot='';
    if(d<=today){ const lg=logByDate[fmt(d)];
      const c = lg&&lg['부하'] ? eColor[lg['부하']] : '#dedbd4';
      const tip = lg ? `부하 ${lg['부하']||'?'} · 컨디션 ${lg['컨디션']||'?'}` : '기록 없음';
      dot=` <span title="${tip}" style="display:inline-block;width:9px;height:9px;border-radius:50%;background:${c};vertical-align:0"></span>`; }
    return `<div class="dhead ${t?'today':''}">${dows[i]} <span class="dt">${d.getMonth()+1}/${d.getDate()}</span>${dot}${t?' · 오늘':''}</div>`;
  }).join('');
  let gutter = `<div class="gutter" style="height:${H}px">`;
  for(let h=7; h<24; h+=2) gutter += `<div class="hr" style="top:${top(h*60)}px">${h}시</div>`;
  gutter += '</div>';
  html += gutter;

  const flexPlan = buildFlexPlan(backlog, days, dows, mon, weekEnd, now);
  let primeMin=0, tiredMin=0; const primeDays=new Set(), tiredDays=new Set();

  days.forEach((d,i)=>{
    const key=fmt(d), isToday=d.getTime()===today.getTime(), isPast=d<today;
    const busy = timedBusyForDay(backlog, key, i);
    const flexBlocks = flexPlan.byDate[key] || [];
    const busyWithFlex = busy.concat(flexBlocks.map(b=>({s:b.s,e:b.e}))).sort((a,b)=>a.s-b.s);

    let col=`<div class="col ${isToday?'today':''} ${isPast?'past':''}" style="height:${H}px">`;
    for(let h=7;h<24;h+=2) col+=`<div class="hline" style="top:${top(h*60)}px"></div>`;
    openBlocks(busyWithFlex).filter(o=>o.e-o.s>=60).forEach(o=>{
      const prime = isPrimeBlock(o);
      if(!prime){ tiredMin+=o.e-o.s; tiredDays.add(dows[i]); return; }
      if(prime){ primeMin+=o.e-o.s; primeDays.add(dows[i]); } else { tiredMin+=o.e-o.s; tiredDays.add(dows[i]); }
      col+=`<div class="blk open ${prime?'':'tired'}" style="top:${top(o.s)}px;height:${(o.e-o.s)/60*PXH-2}px">${prime?'오픈 프라임':'자투리'}<span class="t">${Math.round((o.e-o.s)/6)/10}h</span></div>`;
    });
    flexBlocks.forEach(b=>{
      col+=`<div class="blk flex" style="top:${top(b.s)}px;height:${Math.max((b.e-b.s)/60*PXH-2,16)}px">${esc(b.row['할일'])}<span class="t">${hm(b.s)}-${hm(b.e)}${b.partial?' · 일부':''}</span></div>`;
    });
    // 블록 렌더 (겹침: 단순 2레인)
    let prevEnd=-1;
    busy.forEach(b=>{
      if(b.visible===false) return;
      const ov = b.evt && b.s<prevEnd;
      col+=`<div class="blk ${b.cls} ${ov?'ov':''}" style="top:${top(b.s)}px;height:${Math.max((b.e-b.s)/60*PXH-2,14)}px">${b.l}${b.tm?`<span class="t">${b.tm}</span>`:''}</div>`;
      prevEnd=Math.max(prevEnd,b.e);
    });
    if(isToday){ const nm=now.getHours()*60+now.getMinutes();
      if(nm>DAY_S&&nm<DAY_E) col+=`<div class="nowline" style="top:${top(nm)}px"></div>`; }
    col+='</div>';
    html+=col;
  });
  document.getElementById('grid').innerHTML=html;

  // 유동 할일 풀 (date-only 배치일, 이번주)
  const impCls={'상':'imp-h','중':'imp-m','하':'imp-l'};
  const dowOf = ds => { const d=new Date(ds+'T00:00:00'); return ['일','월','화','수','목','금','토'][d.getDay()]; };
  const flex = backlog.filter(r=>{ const bi=bdInfo(r.bd);
    return bi && bi.m===null && bi.date>=fmt(mon) && bi.date<=weekEnd; });
  document.getElementById('flexpool').innerHTML = flex.length ? flex.map(r=>{
    const bi=bdInfo(r.bd);
    const planned = flexPlan.placed.find(b=>b.row===r);
    const planDate = planned ? planned.date : bi.date;
    return `<span class="chip ${r['상태']==='완료'?'done':''}"><span class="day">${dowOf(planDate)}</span>
      <span class="imp ${impCls[r['중요도']]||'imp-l'}"></span>${r['할일']}
      ${planned?`<span class="ddl">${hm(planned.s)}-${hm(planned.e)}</span>`:''}
      ${r.ddl?`<span class="ddl">⏰${r.ddl.slice(5,10).replace('-','/')}${r.dt==='hard'?'!':''}</span>`:''}</span>`;
  }).join('') : '<span style="font-size:12px;color:#a7a49e">없음</span>';
  document.getElementById('flexn').textContent = `· ${flex.length}건`;
  // 백로그 풀 (배치일 없음, 할일·행동변화만)
  const back = backlog.filter(r=> !r.bd && (r['유형']==='할일'||r['유형']==='행동변화') && r['상태']!=='완료')
    .sort((a,b)=> ('상중하'.indexOf(a['중요도']||'하')) - ('상중하'.indexOf(b['중요도']||'하')));
  document.getElementById('backpool').innerHTML = back.length ? back.map(r=>
    `<span class="chip"><span class="imp ${impCls[r['중요도']]||'imp-l'}"></span>${r['할일']}
     ${r.ddl?`<span class="ddl">⏰${r.ddl.slice(5,10).replace('-','/')}</span>`:''}</span>`).join('')
    : '<span style="font-size:12px;color:#a7a49e">비어있음 🎉</span>';
  document.getElementById('backn').textContent = `· ${back.length}건`;

  // 요약 카드
  const must = backlog.filter(r=> r.ddl && r.ddl.slice(0,10)<=weekEnd && r['상태']!=='완료' && r['유형']==='할일');
  const hh = m => (Math.round(m/30)/2);
  const placedMin = flexPlan.placed.reduce((sum,b)=>sum+b.duration,0);
  document.getElementById('cards').innerHTML = `
    <div class="card"><div class="l">남은 프라임</div><div class="v">~${hh(primeMin)}시간</div><div class="d">${[...primeDays].join('·')||'—'}</div></div>
    <div class="card"><div class="l">유동 배치</div><div class="v">${flexPlan.placed.length}건</div><div class="d">~${hh(placedMin)}시간${flexPlan.unplaced.length?` · 미배치 ${flexPlan.unplaced.length}건`:''}</div></div>
    <div class="card"><div class="l">이번주 필수</div><div class="v">${must.length}건</div><div class="d">${must.map(r=>r['할일'].split(' ')[0]).slice(0,3).join(' · ')||'—'}</div></div>`;
  document.getElementById('tips').innerHTML = renderTips(primeMin, tiredMin, must, flexPlan);
}
function esc(v){ return String(v??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'","&#39;"); }
function renderTips(primeMin, tiredMin, must, flexPlan){
  const tips=[];
  const hard = must.filter(r=>r.dt==='hard').length;
  if(flexPlan.unplaced.length){
    tips.push(`프라임에 못 넣은 유동 할일 ${flexPlan.unplaced.length}건이 있어요. 마감/중요도 낮은 항목을 다음주로 넘기거나 30분 첫 행동으로 쪼개세요.`);
  } else if(flexPlan.placed.length){
    tips.push(`유동 할일 ${flexPlan.placed.length}건을 프라임 슬롯에 자동 배치했습니다. 새 약속이 생기면 같은 기준으로 다시 나눕니다.`);
  }
  if(hard) tips.push(`이번주 hard 마감 ${hard}건은 상태보다 우선입니다. 가장 이른 남은 프라임부터 지키는 편이 낫습니다.`);
  if(primeMin>=150) tips.push(`아직 ${Math.round(primeMin/30)/2}시간 정도의 프라임이 남아 있습니다. 오전/긴 저녁 블록은 딥워크 한 가지에 쓰세요.`);
  if(tiredMin>=180) tips.push('자투리 시간은 화면에서 숨겼습니다. 이 시간은 회복, 식사, 정리처럼 낮은 에너지 작업으로만 보세요.');
  if(!tips.length) tips.push('이번주 보드는 빡빡합니다. 새 일을 넣기 전에 기존 유동 할일 하나를 덜어내는 편이 안전합니다.');
  return tips.slice(0,3).map(t=>`<div class="tip">${esc(t)}</div>`).join('');
}
let resizeTimer=null;
window.addEventListener('resize', ()=>{
  if(!backlog || !dlog) return;
  clearTimeout(resizeTimer);
  resizeTimer=setTimeout(render,120);
});
load();
</script>
